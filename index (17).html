<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midas Roeven</title>
    <meta name="description" content="Midas Roeven — Entrepreneur & creatief co-founder">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100%;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0f0e0d;
            color: #e8e4dd;
            overflow: hidden;
        }
        .wrap {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            padding: 2rem;
        }
        .triangle {
            width: 0;
            height: 0;
            border-left: 60px solid transparent;
            border-right: 60px solid transparent;
            border-bottom: 100px solid #c4a572;
            margin-bottom: 3rem;
            animation: pulse 4s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.9; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.03); }
        }
        h1 {
            font-size: clamp(2rem, 6vw, 4rem);
            font-weight: 300;
            letter-spacing: 0.05em;
            margin-bottom: 1rem;
        }
        .sub {
            font-size: 1rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            opacity: 0.6;
        }
        .bg-tri {
            position: absolute;
            width: 0;
            height: 0;
            opacity: 0.04;
            pointer-events: none;
        }
        .tri-1 {
            top: 10%; left: 10%;
            border-left: 80px solid transparent;
            border-right: 80px solid transparent;
            border-bottom: 140px solid #c4a572;
            transform: rotate(15deg);
        }
        .tri-2 {
            bottom: 15%; right: 12%;
            border-left: 120px solid transparent;
            border-right: 120px solid transparent;
            border-bottom: 200px solid #c4a572;
            transform: rotate(-25deg);
        }
        .tri-3 {
            top: 50%; right: 20%;
            border-left: 40px solid transparent;
            border-right: 40px solid transparent;
            border-bottom: 70px solid #c4a572;
            transform: rotate(180deg);
        }
        footer {
            position: absolute;
            bottom: 2rem;
            font-size: 0.75rem;
            letter-spacing: 0.15em;
            opacity: 0.4;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="bg-tri tri-1"></div>
    <div class="bg-tri tri-2"></div>
    <div class="bg-tri tri-3"></div>
    <div class="wrap">
        <div class="triangle"></div>
        <h1>Midas Roeven</h1>
        <p class="sub">Portfolio — binnenkort</p>
        <footer>Sprang-Capelle · Nederland</footer>
    </div>
</body>
</html>
